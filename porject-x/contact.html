<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - MERON PRODUCTION</title>
    <link rel="stylesheet" href="styel.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(120deg, #232526 0%, #414345 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .contact-page {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .contact-card {
            width: min(1000px, 100%);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.25);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 20px;
            padding: 40px 32px;
            color: #fff;
        }

        .contact-title {
            margin: 0 0 12px 0;
            color: #FFD700;
            font-size: 2.2rem;
            letter-spacing: 1px;
            text-align: center;
        }

        .contact-subtitle {
            margin: 0 auto 28px auto;
            max-width: 720px;
            text-align: center;
            color: #f3f3f3;
            line-height: 1.7;
            font-size: 1.1rem;
        }

        .contact-form {
            width: 100%;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-field--full {
            grid-column: 1 / -1;
        }

        .form-field label {
            font-weight: bold;
            color: #fff;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .form-field input,
        .form-field select,
        .form-field textarea {
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            outline: none;
            background: rgba(0, 0, 0, 0.25);
            color: #fff;
            font-size: 15px;
        }

        .form-field input:focus,
        .form-field select:focus,
        .form-field textarea:focus {
            border-color: rgba(255, 215, 0, 0.65);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.12);
        }

        .form-field input.invalid,
        .form-field select.invalid,
        .form-field textarea.invalid {
            border-color: rgba(255, 90, 90, 0.9);
            box-shadow: 0 0 0 3px rgba(255, 90, 90, 0.12);
        }

        .form-actions {
            margin-top: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .form-status {
            margin: 0;
            min-height: 20px;
            font-size: 14px;
            color: #f3f3f3;
        }

        .form-status.success {
            color: #90ee90;
        }

        .form-status.error {
            color: #ffb3b3;
        }

        .social-row {
            margin-top: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
        }

        .social-row a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 14px;
            text-decoration: none;
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.18);
            color: #FFD700;
            font-weight: bold;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .social-row a:hover {
            transform: translateY(-2px);
            background: rgba(255, 215, 0, 0.12);
        }

        @media (max-width: 820px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .contact-card {
                padding: 28px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="nav">
        <div class="nav1">
            <i class="fas fa-camera"></i>
            <span>MERON <br> PRODUCTION</span>
        </div>
        <div class="nav2"><a href="home.html">Home</a></div>
         <div class="nav7"><a href="contact.html">Contact</a></div>
        <div class="nav4"><a href="about.html">About us</a></div>
        <div class="nav5"><a href="booking.html">Booking</a></div>
        <div class="nav6"><a href="faq.html">FAQ</a></div>
        <div class="nav3"><a href="portfolio.html">GALLERY</a></div>
        <div class="nav9">
            <a href="https://instagram.com" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://facebook.com" target="_blank" title="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="https://linkedin.com" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
        </div>
    </div>

    <main class="contact-page">
        <section class="contact-card">
            <h1 class="contact-title">Contact</h1>
            <p class="contact-subtitle">Send us a message and we’ll reply as soon as possible.</p>

            <form class="contact-form" id="contactForm" novalidate>
                <div class="form-grid">
                    <div class="form-field">
                        <label for="contactName">Full Name</label>
                        <input id="contactName" name="contactName" type="text" autocomplete="name" required>
                    </div>
                    <div class="form-field">
                        <label for="contactEmail">Email</label>
                        <input id="contactEmail" name="contactEmail" type="email" autocomplete="email" required>
                    </div>
                    <div class="form-field">
                        <label for="contactSubject">Subject (optional)</label>
                        <input id="contactSubject" name="contactSubject" type="text">
                    </div>
                    <div class="form-field">
                        <label for="contactPhone">Phone (optional)</label>
                        <input id="contactPhone" name="contactPhone" type="tel" autocomplete="tel">
                    </div>
                    <div class="form-field form-field--full">
                        <label for="contactMessage">Message</label>
                        <textarea id="contactMessage" name="contactMessage" rows="6" required></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="cta-button" type="submit">Send Message</button>
                    <p class="form-status" id="contactStatus" aria-live="polite"></p>
                </div>
            </form>

            <div class="social-row">
                <a href="https://instagram.com" target="_blank" rel="noopener"><i class="fab fa-instagram"></i> Instagram</a>
                <a href="https://facebook.com" target="_blank" rel="noopener"><i class="fab fa-facebook"></i> Facebook</a>
                <a href="https://linkedin.com" target="_blank" rel="noopener"><i class="fab fa-linkedin"></i> LinkedIn</a>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
