    <link rel="stylesheet" href="styel.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .portfolio-main-container {
            width: 100%;
            top:0;
            height: auto;
            overflow: hidden;
             background-color: rgba(0, 0, 0, 0.719);
        }
        .portfolio-background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height:100%;
            background-image: url(imag/m1.jpg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 1;
            z-index: 0;
        }

        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .portfolio-section {
            position: relative;
            padding: 60px 40px;
            /* background-color: rgba(0, 0, 0, 0.7); */
            min-height: calc(100vh - 80px);
            margin-top: 80px;
            z-index: 1;
        }

        .portfolio-title {
            text-align: center;
            color: #FFD700;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 50px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .portfolio-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 300px;
        }

        .portfolio-item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }

        .portfolio-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
        }

        .portfolio-item:hover img {
            filter: brightness(0.7);
        }

        .portfolio-item-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .portfolio-item:hover .portfolio-item-overlay {
            opacity: 1;
        }

        .portfolio-item-text {
            color: #FFD700;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        .back-link {
            display: inline-block;
            margin-top: 50px;
            margin-left: 40px;
            color: #FFD700;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #FFA500;
        }

        .back-link i {
            margin-right: 8px;
        }

        /* Lightbox styles */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-container {
            position: relative;
            width: 90%;
            height: 80vh;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            animation: fadeIn 0.3s ease;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 40px;
            color: #f7f7f7;
            cursor: pointer;
            transition: color 0.3s ease;
            z-index: 2001;
        }

        .lightbox-close:hover {
            color: #ffffff;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 50px;
            color: #fdfdfc;
            cursor: pointer;
            padding: 20px 30px;
            transition: color 0.3s ease, background 0.3s ease;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            user-select: none;
        }

        .lightbox-nav:hover {
            color: #fafaf9;
            background: rgba(0, 0, 0, 0.8);
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }

        .lightbox-counter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 5px;
        }

        @media (max-width: 768px) {
            .lightbox-nav {
                font-size: 30px;
                padding: 15px 20px;
            }
            .lightbox-close {
                font-size: 30px;
            }
        }
    </style>
</head>
